<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Mini-Projekt</title>
    <style>
        /* Dark Mode Elegant Style */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1e1e1e;
            color: #f5f5f5;
            text-align: center;
            padding: 50px;
            line-height: 1.6;
        }
        h1 {
            color: #00bfff;
            font-size: 3em;
        }
        p {
            font-size: 1.2em;
            color: #cccccc;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background-color: #00bfff;
            color: #1e1e1e;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0090cc;
        }
    </style>
</head>
<body>
    <h1>Willkommen!</h1>
    <p id="text">Das ist mein kleines Mini-Projekt.</p>
    <button onclick="changeText()">Klick mich!</button>

    <script>
        function changeText() {
            const p = document.getElementById('text');
            p.textContent = "Schön, Sie haben den Button geklickt!";
        }
    </script>
</body>
</html>
